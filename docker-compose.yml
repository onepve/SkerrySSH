# Skerry Sync — 自托管同步服务 (AGPL-3.0)。
#
# 部署步骤:
#   cp server/.env.example /opt/SkerrySSH-Sync/.env
#   vim /opt/SkerrySSH-Sync/.env              # 填写密钥和邮件等参数
#   cp docker-compose.yml /opt/SkerrySSH-Sync/docker-compose.yml
#   docker compose -f /opt/SkerrySSH-Sync/docker-compose.yml up -d --build
#
# 所有敏感信息（.env、数据库）均在 /opt/SkerrySSH-Sync/ 目录下，与源码仓库隔离。

services:
  sync:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    env_file: /opt/SkerrySSH-Sync/.env
    volumes:
      - /opt/SkerrySSH-Sync/data:/data
    restart: unless-stopped
