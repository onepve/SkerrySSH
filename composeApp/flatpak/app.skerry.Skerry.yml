id: app.skerry.Skerry
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
# The build compiles from source with a bundled JDK 21 (matches jvmToolchain(21)); the runtime
# then relies on the JRE that jpackage/jlink embed in the app-image, so no openjdk at run time.
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk21

command: skerry

finish-args:
  - --share=network            # SSH/SFTP/telnet/serial-over-IP, self-hosted sync, AI providers
  - --socket=x11               # Compose Desktop renders through AWT/Skiko, which is X11-only (no
                               # native Wayland toolkit in OpenJDK yet) — so it runs via XWayland on
                               # Wayland sessions, exactly like the deb/AppImage builds. Must be an
                               # unconditional x11 grant: fallback-x11 self-disables under Wayland and
                               # leaves the JVM headless.
  - --share=ipc               # MIT-SHM for AWT/X11 — without it the renderer crashes natively
  - --device=dri               # GPU for Skia/Compose rendering
  - --filesystem=host          # SFTP transfers to/from anywhere + importing SSH keys/configs (an SSH
                               # client is expected to reach the whole filesystem, not just ~)

modules:
  - name: skerry
    buildsystem: simple
    build-options:
      # No network during build-commands: Gradle resolves from the offline-repository that
      # flatpak-builder materialises from flatpak-sources.json in the pre-build download phase.
      build-args: []
    build-commands:
      # One shell: flatpak-builder runs each command in a fresh shell, so the JDK env and the
      # Gradle invocation must live together. JDK 21 (with jpackage/jlink) comes from the openjdk21
      # extension; GRADLE_USER_HOME stays in the build tree (HOME is not writable in the sandbox).
      # desktopOnly drops the Android app/toolchain; --offline + the vendored JDK path keep the
      # whole build hermetic (settings.gradle.kts adds ./offline-repository as a Maven repo).
      - |
        . /usr/lib/sdk/openjdk21/enable.sh
        export GRADLE_USER_HOME="$PWD/.gradle-home"
        # The generator emits no maven-metadata.xml, so version ranges (e.g. bouncycastle's
        # bcutil-jdk18on:[1.80,1.81)) can't resolve offline — synthesise it for the vendored repo.
        python3 composeApp/flatpak/tools/gen-maven-metadata.py offline-repository
        gradle-dist/bin/gradle --offline --no-daemon -PdesktopOnly \
          -Dskerry.offlineRepo="$PWD/offline-repository" \
          -Porg.gradle.java.installations.auto-download=false \
          -Porg.gradle.java.installations.paths=/usr/lib/sdk/openjdk21/jvm/openjdk-21 \
          :composeApp:createDistributable
      # Install the jpackage app-image (bin/ + lib/ with the embedded JRE) under /app/skerry and
      # expose its native launcher as /app/bin/skerry (the manifest's `command`).
      - cp -a composeApp/build/compose/binaries/main/app/Skerry /app/skerry
      - mkdir -p /app/bin
      - ln -s /app/skerry/bin/Skerry /app/bin/skerry
      # Desktop entry, icon (renamed to the app-id), and AppStream metainfo.
      - install -Dm644 composeApp/flatpak/app.skerry.Skerry.desktop /app/share/applications/app.skerry.Skerry.desktop
      - install -Dm644 composeApp/icons/skerry.png /app/share/icons/hicolor/512x512/apps/app.skerry.Skerry.png
      - install -Dm644 composeApp/flatpak/app.skerry.Skerry.metainfo.xml /app/share/metainfo/app.skerry.Skerry.metainfo.xml
    sources:
      # The project working tree. Build artifacts and VCS/gradle state are skipped so the sandbox
      # starts clean; offline-repository is materialised separately from flatpak-sources.json.
      - type: dir
        path: ../..
        skip:
          - .git
          - .gradle
          - .kotlin
          - .idea
          - build
          - composeApp/build
          - shared/build
          - sync-wire/build
          - server/build
          - androidApp/build
          - offline-repository
          - .gradle-home
      # Gradle distribution (the wrapper can't self-download offline). Pinned to the wrapper's
      # version + checksum; extracted to gradle-dist/ and invoked directly.
      - type: archive
        url: https://services.gradle.org/distributions/gradle-9.3.1-bin.zip
        sha256: b266d5ff6b90eada6dc3b20cb090e3731302e553a27c5d3e4df1f0d76beaff06
        dest: gradle-dist
        strip-components: 1
      # Every Maven artifact of the desktop build (URL + sha256), downloaded into ./offline-repository
      # as a standard Maven layout. Generated by tools/flatpak-gen.init.gradle.kts — see package-flatpak.sh.
      - flatpak-sources.json
