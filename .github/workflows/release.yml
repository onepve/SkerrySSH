name: Release build

# Three modes:
#   • Pull request touching packaging/toolchain files: builds every distributable as a
#     pre-merge smoke test and uploads them as run artifacts — publishes NOTHING. This
#     catches release-only breakage (e.g. a dependency bump that desyncs the Flatpak
#     offline repo, or a new jar that collides in the Android resource merge) on the PR
#     instead of on the release tag. The paths filter keeps it off unrelated PRs.
#   • Manual (workflow_dispatch): builds all distributables and uploads them as run
#     artifacts only — publishes NOTHING, exactly as before.
#   • Tag push (v*): builds with the version taken from the tag, then publishes a DRAFT
#     GitHub Release with the packages + SHA256SUMS attached. A human reviews the draft
#     and clicks Publish — nothing goes public automatically.
# The sync server is released separately (tags server-v*) — see server-image.yml.
on:
  pull_request:
    # Only files that can change what the release build produces. A dependency/toolchain
    # bump (libs.versions.toml), a Gradle wrapper change, any build script, the version
    # source, or the Flatpak offline sources all land here; UI/logic-only PRs don't.
    paths:
      - "gradle/libs.versions.toml"
      - "gradle/wrapper/**"
      - "gradle.properties"
      - "settings.gradle.kts"
      - "**/build.gradle.kts"
      - "composeApp/flatpak/**"
      - ".github/workflows/release.yml"
  workflow_dispatch:
    inputs:
      versionName:
        description: "Override versionName (e.g. 0.2.0). Empty — taken from gradle.properties."
        required: false
        type: string
      versionCode:
        description: "Override Android versionCode (integer). Empty — from gradle.properties."
        required: false
        type: string
  push:
    tags:
      - "v*"

env:
  TZ: Asia/Shanghai

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Resolve the version once so all build jobs agree. On a tag push the name comes from
  # the tag (v0.2.0 → 0.2.0); on a manual run from the dispatch input; empty → the build
  # falls back to the gradle.properties default.
  version:
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.resolve.outputs.name }}
    steps:
      - id: resolve
        # inputs.versionName goes through env, never interpolated into the shell — otherwise a
        # dispatch input could inject commands into this step (it writes $GITHUB_OUTPUT).
        env:
          INPUT_VERSION: ${{ inputs.versionName }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "name=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          fi

  linux-desktop:
    needs: version
    env:
      TZ: Asia/Shanghai
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install jpackage tooling (deb/rpm)
        # jpackage needs the rpm package for .rpm; fakeroot is needed for .deb.
        run: sudo apt-get update && sudo apt-get install -y rpm fakeroot

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Package deb + rpm + Chinese distro debs (x86_64 only)
        if: matrix.arch == 'x86_64'
        run: >
          ./gradlew :composeApp:packageDeb :composeApp:packageRpm :composeApp:packageChineseDebs --stacktrace
          ${{ needs.version.outputs.name && format('-Pskerry.versionName={0}', needs.version.outputs.name) || '' }}

      - name: Package deb + rpm
        if: matrix.arch != 'x86_64'
        run: >
          ./gradlew :composeApp:packageDeb :composeApp:packageRpm --stacktrace
          ${{ needs.version.outputs.name && format('-Pskerry.versionName={0}', needs.version.outputs.name) || '' }}

      - name: Package Chinese distro deb (aarch64)
        # All three distros ship ARM64 editions (Kylin V10 Phytium/Kunpeng, UOS V20
        # kunpeng/feiteng, NARI Linx) — one unified .deb for all. The repack task
        # auto-detects arch from the source deb name, so no script changes needed.
        if: matrix.arch == 'aarch64'
        run: >
          ./gradlew :composeApp:packageChineseDebs --stacktrace
          ${{ needs.version.outputs.name && format('-Pskerry.versionName={0}', needs.version.outputs.name) || '' }}

      - name: Fetch appimagetool
        # Pin the tool to an immutable tagged release (not the mutable `continuous` tag) and verify
        # its sha256 before use — a swapped binary here would run in the build. Passing arch via env
        # keeps the matrix value out of the shell command.
        env:
          APPIMAGETOOL_VERSION: "1.9.1"
          ARCH: ${{ matrix.arch }}
        run: |
          case "$ARCH" in
            x86_64)  sha=ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0 ;;
            aarch64) sha=f0837e7448a0c1e4e650a93bb3e85802546e60654ef287576f46c71c126a9158 ;;
            *) echo "unsupported arch: $ARCH" >&2; exit 1 ;;
          esac
          curl -fsSL -o "$RUNNER_TEMP/appimagetool" \
            "https://github.com/AppImage/appimagetool/releases/download/${APPIMAGETOOL_VERSION}/appimagetool-${ARCH}.AppImage"
          echo "${sha}  ${RUNNER_TEMP}/appimagetool" | sha256sum -c -
          chmod +x "$RUNNER_TEMP/appimagetool"
          echo "APPIMAGETOOL=$RUNNER_TEMP/appimagetool" >> "$GITHUB_ENV"

      - name: Package AppImage
        # createDistributable (a dependency of packageAppImage) rebuilds the app-image; the
        # script wraps it into a portable .AppImage. CI has no FUSE — the script sets
        # APPIMAGE_EXTRACT_AND_RUN so appimagetool and mksquashfs run without it.
        run: >
          ./gradlew :composeApp:packageAppImage --stacktrace
          ${{ needs.version.outputs.name && format('-Pskerry.versionName={0}', needs.version.outputs.name) || '' }}

      - name: Build xinchuang portable ZIP x86_64 (kylin/uos/nari unified)
        # Same app-image the AppImage step just rebuilt. The zip holds a single skerry/
        # folder: launcher script + bin/ + lib/ on top, data root portable/ inside — the
        # app detects portable/ next to its launcher and keeps vault/keys/config there.
        # One zip for all three distros (contents are identical).
        # ZIP (not tar.gz) so xinchuang users on Windows desktops can extract it natively.
        if: matrix.arch == 'x86_64'
        run: |
          set -euo pipefail
          SRC=composeApp/build/compose/binaries/main/app/Skerry
          TMP=$(mktemp -d)
          mkdir -p "$TMP/skerry"
          cp -a "$SRC/bin" "$SRC/lib" "$TMP/skerry/"
          # All-lowercase inside the zip, same rule as the Chinese deb — mixed-case
          # leftovers break on case-sensitive Linux filesystems.
          mv "$TMP/skerry/bin/Skerry" "$TMP/skerry/bin/skerry"
          mv "$TMP/skerry/lib/Skerry.png" "$TMP/skerry/lib/skerry.png"
          rm -f "$TMP/skerry/lib/"*.desktop
          find "$TMP/skerry/lib/app" -depth -name '*[A-Z]*' \
            -exec bash -c 'for p; do mv "$p" "$(dirname "$p")/$(basename "$p" | tr "A-Z" "a-z")"; done' _ {} +
          # jpackage launcher resolves its cfg by executable name — bin/skerry
          # looks for lib/app/skerry.cfg. The find above already lowercases the
          # filename, but keep an explicit rename guard for clarity.
          [ -f "$TMP/skerry/lib/app/Skerry.cfg" ] && mv "$TMP/skerry/lib/app/Skerry.cfg" "$TMP/skerry/lib/app/skerry.cfg"
          sed -i -E 's/^(app\.classpath=\$APPDIR\/)(.*)$/\1\L\2/' "$TMP/skerry/lib/app/skerry.cfg"
          mkdir -p "$TMP/skerry/portable"
          cp composeApp/portable/README.txt "$TMP/skerry/portable/README.txt"
          printf '#!/bin/sh\nHERE="$(cd "$(dirname "$(readlink -f "$0")")" && pwd)"\nexec "$HERE/bin/skerry" "$@"\n' > "$TMP/skerry/skerry"
          chmod 755 "$TMP/skerry/skerry"
          (cd "$TMP" && zip -qr skerry-xinchuang-amd64-portable.zip skerry)
          mv "$TMP/skerry-xinchuang-amd64-portable.zip" "$GITHUB_WORKSPACE/"
          rm -rf "$TMP"

      - name: Build xinchuang portable ZIP arm64 (kylin/uos/nari unified)
        if: matrix.arch == 'aarch64'
        run: |
          set -euo pipefail
          SRC=composeApp/build/compose/binaries/main/app/Skerry
          TMP=$(mktemp -d)
          mkdir -p "$TMP/skerry"
          cp -a "$SRC/bin" "$SRC/lib" "$TMP/skerry/"
          mv "$TMP/skerry/bin/Skerry" "$TMP/skerry/bin/skerry"
          mv "$TMP/skerry/lib/Skerry.png" "$TMP/skerry/lib/skerry.png"
          rm -f "$TMP/skerry/lib/"*.desktop
          find "$TMP/skerry/lib/app" -depth -name '*[A-Z]*' \
            -exec bash -c 'for p; do mv "$p" "$(dirname "$p")/$(basename "$p" | tr "A-Z" "a-z")"; done' _ {} +
          # jpackage launcher resolves its cfg by executable name — bin/skerry
          # looks for lib/app/skerry.cfg. Explicit rename guard for clarity.
          [ -f "$TMP/skerry/lib/app/Skerry.cfg" ] && mv "$TMP/skerry/lib/app/Skerry.cfg" "$TMP/skerry/lib/app/skerry.cfg"
          sed -i -E 's/^(app\.classpath=\$APPDIR\/)(.*)$/\1\L\2/' "$TMP/skerry/lib/app/skerry.cfg"
          mkdir -p "$TMP/skerry/portable"
          cp composeApp/portable/README.txt "$TMP/skerry/portable/README.txt"
          printf '#!/bin/sh\nHERE="$(cd "$(dirname "$(readlink -f "$0")")" && pwd)"\nexec "$HERE/bin/skerry" "$@"\n' > "$TMP/skerry/skerry"
          chmod 755 "$TMP/skerry/skerry"
          (cd "$TMP" && zip -qr skerry-xinchuang-arm64-portable.zip skerry)
          mv "$TMP/skerry-xinchuang-arm64-portable.zip" "$GITHUB_WORKSPACE/"
          rm -rf "$TMP"

      - name: Upload Linux distributables
        # deb/rpm/AppImage names already carry the arch (amd64/arm64, x86_64/aarch64),
        # so the two matrix legs can't collide in the release.
        uses: actions/upload-artifact@v7
        with:
          name: skerry-linux-${{ matrix.arch }}
          path: |
            composeApp/build/compose/binaries/main/deb/*.deb
            composeApp/build/compose/binaries/main/rpm/*.rpm
            composeApp/build/compose/binaries/main/appimage/*.AppImage
            skerry-*-portable.zip
          if-no-files-found: error

  windows-desktop:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set timezone to China Standard Time
        run: Set-TimeZone -Id "China Standard Time"

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      # Windows installers: MSI + WiX-Burn EXE. Both go through light.exe, which links
      # with code page 1252 — the package description MUST stay ASCII-only or the link
      # dies with LGHT0311 (exit 311). See composeApp/build.gradle.kts.
      - name: Install WiX Toolset (jpackage MSI)
        # jpackage needs WiX 3.x (candle.exe/light.exe) for .msi; recent
        # windows runners may not ship it.
        run: choco install wixtoolset -y --no-progress

      - name: Install Inno Setup
        # Replaces jpackage's WiX-Burn EXE (crashes on reinstall).
        run: |
          choco install innosetup -y --no-progress
          # Download Chinese Simplified language file (not included in choco package)
          $langDir = "C:\Program Files (x86)\Inno Setup 6\Languages"
          if (-not (Test-Path "$langDir\ChineseSimplified.isl")) {
            Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/ChineseSimplified.isl" -OutFile "$langDir\ChineseSimplified.isl"
          }

      - name: Package msi
        id: msi
        shell: bash
        # downloadWix fetches wix3112rtm.zip from github.com and the runner's
        # connection to it is flaky (NoHttpResponseException), so retry before failing.
        run: |
          for attempt in 1 2 3; do
            echo "=== packageMsi attempt $attempt ==="
            if ./gradlew :composeApp:packageMsi --stacktrace \
              ${{ needs.version.outputs.name && format('-Pskerry.versionName={0}', needs.version.outputs.name) || '' }}; then
              echo "packageMsi succeeded on attempt $attempt"
              exit 0
            fi
            echo "attempt $attempt failed, waiting before retry..."
            sleep 20
          done
          echo "packageMsi failed after 3 attempts"
          for f in composeApp/build/compose/logs/packageMsi/jpackage-*-err.txt; do
            echo "===== $f ====="; cat "$f" || true
          done
          exit 1

      - name: Build EXE with Inno Setup
        id: exe
        shell: bash
        env:
          VER: ${{ needs.version.outputs.name || '0.1.0' }}
          MSYS_NO_PATHCONV: "1"
        run: |
          # Ensure app-image exists (independent of packageMsi success)
          ./gradlew :composeApp:createDistributable -Pskerry.versionName="$VER" --stacktrace
          mkdir -p composeApp/build/compose/binaries/main/exe
          iscc composeApp/skerry.iss /DMyAppVersion="$VER" /DAppImageDir="build/compose/binaries/main/app/Skerry"

      - name: Build portable ZIP
        # Shell-based instead of the Gradle task — avoids config-cache serialization
        # issues with Gradle 9.x on Windows runners.
        shell: bash
        env:
          VER: ${{ needs.version.outputs.name || '0.1.0' }}
        run: |
          set -euo pipefail
          SRC=composeApp/build/compose/binaries/main/app/Skerry
          DST_DIR=composeApp/build/compose/binaries/main/portable
          mkdir -p "$DST_DIR"
          # Create portable/ marker with README
          mkdir -p "$SRC/portable"
          cp composeApp/portable/README.txt "$SRC/portable/README.txt"
          # 7z (available on Windows runners) for zip creation
          (cd "$(dirname "$SRC")" && 7z a -tzip -mx9 "${GITHUB_WORKSPACE}/${DST_DIR}/Skerry-${VER}-portable.zip" Skerry/ -bso0 -bsp0)

      - name: Suffix and rename for distribution
        # jpackage emits Skerry-<version>.{msi,exe} with no arch marker; every other desktop
        # asset carries one, and a Windows ARM build would otherwise collide.
        # Rename to the fixed public names used by the download page / R2 latest/.
        shell: bash
        run: |
          cd composeApp/build/compose/binaries/main/msi
          for f in *.msi; do mv "$f" "Skerry-windows-x64.msi"; done
          cd ../exe
          for f in Skerry-*-setup.exe; do mv "$f" "Skerry-windows-x64.exe"; done
          cd ../portable
          for f in *.zip; do mv "$f" "Skerry-portable-x64.zip"; done

      - name: Upload Windows distributables
        uses: actions/upload-artifact@v7
        with:
          name: skerry-windows-x64
          path: |
            composeApp/build/compose/binaries/main/msi/*.msi
            composeApp/build/compose/binaries/main/exe/*.exe
            composeApp/build/compose/binaries/main/portable/*.zip
          if-no-files-found: error

  macos-desktop:
    needs: version
    strategy:
      matrix:
        include:
          - runner: macos-latest    # Apple Silicon
            arch: arm64
          - runner: macos-15-intel  # last Intel runner; free for public repos until ~Dec 2027
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Package dmg
        # Unsigned/un-notarized on purpose (no Apple Developer account yet) — Gatekeeper
        # will require a manual allow in System Settings on first launch.
        run: >
          ./gradlew :composeApp:packageDmg --stacktrace
          ${{ needs.version.outputs.name && format('-Pskerry.versionName={0}', needs.version.outputs.name) || '' }}

      - name: Rename dmg to the real version and suffix the architecture
        # jpackage forces the mac bundle version's major to >=1 (see build.gradle.kts), so
        # the emitted file is Skerry-1.x.y.dmg. Rename it back to the release version and
        # disambiguate the matrix legs before the release step flattens everything.
        # On a manual run without a version, fall back to the gradle.properties default.
        # Version/arch come through env, not interpolated into the shell (injection-safe).
        env:
          VERSION_NAME: ${{ needs.version.outputs.name }}
          ARCH: ${{ matrix.arch }}
        run: |
          version="$VERSION_NAME"
          [ -z "$version" ] && version="$(sed -n 's/^skerry.versionName=//p' gradle.properties)"
          cd composeApp/build/compose/binaries/main/dmg
          for f in *.dmg; do mv "$f" "Skerry-${version}-${ARCH}.dmg"; done

      - name: Upload macOS distributable
        uses: actions/upload-artifact@v7
        with:
          name: skerry-macos-${{ matrix.arch }}
          path: composeApp/build/compose/binaries/main/dmg/*.dmg
          if-no-files-found: error

  android:
    needs: version
    runs-on: ubuntu-latest
    env:
      # Only a non-secret boolean at job level (secrets can't be referenced directly in `if:`).
      # The keystore blob and the signing passwords are scoped to the two steps that need them, so
      # checkout / SDK setup — and the untrusted Gradle plugin + JitPack dependency graph they pull —
      # never see them via the job environment.
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4

      - name: Install Android SDK packages
        # The runner's bundled sdkmanager repository predates API 37 and can't resolve
        # platforms;android-37 or build-tools;37.0.0, so fetch both archives from Google's
        # SDK repo directly and unpack them where sdkmanager would.
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          install_sdk_pkg() {
            curl -fsSL "$1" -o "$RUNNER_TEMP/sdk-pkg.zip"
            rm -rf "$RUNNER_TEMP/sdk-pkg" && unzip -q "$RUNNER_TEMP/sdk-pkg.zip" -d "$RUNNER_TEMP/sdk-pkg"
            mkdir -p "$(dirname "$2")" && rm -rf "$2"
            mv "$(find "$RUNNER_TEMP/sdk-pkg" -mindepth 1 -maxdepth 1 -type d)" "$2"
          }
          install_sdk_pkg https://dl.google.com/android/repository/platform-37.0_r02.zip "$ANDROID_HOME/platforms/android-37"
          install_sdk_pkg https://dl.google.com/android/repository/build-tools_r37_linux.zip "$ANDROID_HOME/build-tools/37.0.0"

      - name: Decode release keystore
        # Without the secret this step is skipped → release is built unsigned (fallback in build.gradle.kts).
        # The base64 blob is a step-scoped env, not visible to any other step.
        if: env.HAS_KEYSTORE == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/skerry-release.jks"
          echo "SKERRY_KEYSTORE_FILE=$RUNNER_TEMP/skerry-release.jks" >> "$GITHUB_ENV"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Assemble release APK
        # versionCode must be a monotonic integer; the tag's semver can't map to one, so use
        # the run number (grows every run). A dispatch input still overrides it if provided.
        # Signing passwords are scoped to this step only; version values go through env (not
        # interpolated into the shell) to close the expression-injection surface.
        env:
          SKERRY_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          SKERRY_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SKERRY_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          VERSION_NAME: ${{ needs.version.outputs.name }}
          VERSION_CODE: ${{ inputs.versionCode || github.run_number }}
        run: >
          ./gradlew :androidApp:assembleRelease --stacktrace
          ${VERSION_NAME:+-Pskerry.versionName=$VERSION_NAME}
          -Pskerry.versionCode=$VERSION_CODE

      - name: Rename APK to match the other artifacts
        # AGP emits androidApp-release.apk. Rename it to the Skerry-<version> scheme the
        # msi/dmg/AppImage/flatpak assets use (deb/rpm keep the lowercase names their
        # platform conventions dictate).
        # On a manual run without a version, fall back to the gradle.properties default.
        # Version comes through env, not interpolated into the shell (injection-safe).
        env:
          VERSION_NAME: ${{ needs.version.outputs.name }}
        run: |
          version="$VERSION_NAME"
          [ -z "$version" ] && version="$(sed -n 's/^skerry.versionName=//p' gradle.properties)"
          mv androidApp/build/outputs/apk/release/*.apk \
             "androidApp/build/outputs/apk/release/Skerry-${version}.apk"

      - name: Upload Android APK
        uses: actions/upload-artifact@v7
        with:
          name: skerry-android
          path: androidApp/build/outputs/apk/release/Skerry-*.apk
          if-no-files-found: error

  linux-flatpak:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install flatpak + flatpak-builder + runtimes
        # No JDK/Gradle setup: the bundle is built hermetically inside the flatpak sandbox from the
        # committed offline sources (composeApp/flatpak/flatpak-sources.json), using the openjdk21
        # SDK extension. Runtimes go into the --user installation (no root needed to install them).
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install -y --user flathub \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08 \
            org.freedesktop.Sdk.Extension.openjdk21//24.08

      - name: Set release version in gradle.properties
        # The sandbox build reads the version from the copied gradle.properties — it can't see the
        # -P override the other jobs pass. Rewrite it in place when a version is resolved.
        if: needs.version.outputs.name != ''
        # Version through env, not interpolated into the sed command (injection-safe).
        env:
          VERSION_NAME: ${{ needs.version.outputs.name }}
        run: sed -i "s/^skerry.versionName=.*/skerry.versionName=${VERSION_NAME}/" gradle.properties

      - name: Build flatpak bundle
        env:
          VERSION_NAME: ${{ needs.version.outputs.name }}
        run: VERSION="${VERSION_NAME:-0.1.0}" bash composeApp/flatpak/package-flatpak.sh

      - name: Upload flatpak bundle
        uses: actions/upload-artifact@v7
        with:
          name: skerry-flatpak
          path: composeApp/flatpak/*.flatpak
          if-no-files-found: error

  # Publish only on tag pushes. Collects every build job's artifact, adds checksums, and
  # creates a DRAFT release for a human to review and publish. Skipped on manual runs
  # (then the artifacts just stay on the run, as before).
  publish:
    needs: [version, linux-desktop, windows-desktop, macos-desktop, android, linux-flatpak]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Flatten + checksum
        # skerry-linux keeps deb/ and rpm/ subdirs, so flatten every artifact into one
        # directory of files (extensions are unique — no name collisions) before hashing
        # and releasing. `sha256sum *` and `gh release create` both need plain files.
        run: |
          mkdir -p dist
          find artifacts -type f -exec cp {} dist/ \;
          # 删掉内部重打包的 .deb（skerry-xinchuang_0.1.9_amd64.deb），只保留对外版
          rm -f dist/skerry-xinchuang_*.deb
          cd dist && sha256sum * > SHA256SUMS.txt

      - name: Write release notes
        run: |
          cat > dist/RELEASE_NOTES.md <<'EOF'

          > **注意 / Note:** macOS 安装包未签名且未经过公证。首次运行时，请前往系统设置 → 隐私与安全性，点击“仍然打开”。  
          > macOS packages are unsigned and un-notarized. On first launch, open **System Settings → Privacy & Security** and click **Open Anyway**.

          ## 校验 / Verification
          SHA256 校验和请查看 `SHA256SUMS.txt` / SHA256 checksums for all files are in `SHA256SUMS.txt`.
          EOF

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --draft \
            --title "$GITHUB_REF_NAME" \
            --notes-file dist/RELEASE_NOTES.md \
            dist/*

      - name: Upload stable filenames to R2
        # Fixed paths under Skerry/latest/ so the landing page's download cards never change.
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          set -euo pipefail
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          upload() { # $1 local file, $2 r2 key
            aws s3 cp "$1" "s3://${R2_BUCKET_NAME}/Skerry/latest/$2" \
              --endpoint-url "$ENDPOINT" --region auto --no-progress \
              --cache-control "max-age=0, no-cache"
          }
          upload "$(ls dist/Skerry-*.apk)"                    Skerry-android.apk
          upload "$(ls dist/Skerry-windows-x64.exe)"          Skerry-windows-x64.exe
          upload "$(ls dist/Skerry-windows-x64.msi)"          Skerry-windows-x64.msi
          upload "$(ls dist/Skerry-portable-x64.zip)"         Skerry-portable-x64.zip
          upload "$(ls dist/Skerry-*-arm64.dmg)"              Skerry-macos-arm64.dmg
          upload "$(ls dist/Skerry-*-x64.dmg)"                Skerry-macos-x64.dmg
          upload "$(ls dist/skerry_[0-9]*_amd64.deb)"          Skerry-linux-amd64.deb
          upload "dist/Skerry-xinchuang-amd64.deb"          Skerry-xinchuang-amd64.deb
          upload "dist/Skerry-xinchuang-arm64.deb"          Skerry-xinchuang-arm64.deb
          upload "dist/skerry-xinchuang-amd64-portable.zip" skerry-xinchuang-amd64-portable.zip
          upload "dist/skerry-xinchuang-arm64-portable.zip" skerry-xinchuang-arm64-portable.zip
          upload "$(ls dist/*.x86_64.rpm)"                    Skerry-linux-x86_64.rpm
          upload "$(ls dist/*-x86_64.AppImage)"               Skerry-linux-x86_64.AppImage
          upload "$(ls dist/*_arm64.deb)"                     Skerry-linux-arm64.deb
          upload "$(ls dist/*.aarch64.rpm)"                   Skerry-linux-aarch64.rpm
          upload "$(ls dist/*-aarch64.AppImage)"              Skerry-linux-aarch64.AppImage
          upload "$(ls dist/Skerry-*.flatpak)"                Skerry-linux.flatpak
          upload dist/SHA256SUMS.txt                          SHA256SUMS.txt
          # Write and upload the version manifest that the in-app update checker reads.
          VERSION_NAME="${{ needs.version.outputs.name }}"
          [ -z "$VERSION_NAME" ] && VERSION_NAME="$(sed -n 's/^skerry.versionName=//p' gradle.properties)"
          VERSION_CODE="${{ inputs.versionCode || github.run_number }}"
          cat > "$RUNNER_TEMP/version.json" <<EOF
          {
            "version": "$VERSION_NAME",
            "version_code": $VERSION_CODE,
            "page_url": "https://ssh.onepve.com/"
          }
          EOF
          upload "$RUNNER_TEMP/version.json"                   version.json
